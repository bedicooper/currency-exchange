<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <!--<meta http-equiv="X-UA-Compatible" content="IE=edge">-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przelicznik walut</title>
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script defer src="js/script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Merriweather:ital,wght@0,300;0,400;0,900;1,300;1,400;1,900&display=swap"
        rel="stylesheet">
</head>

<body class="body">
    <h1 class="body__header">Przelicznik walut</h1>
    <main class="main">
        <form class="form js-form">
            <!-- <fieldset> -->
            <!-- <legend class="form__legend">Przelicz na złotówki</legend> -->
            <p class="form__paragraph">
                <label><span class="form__labelText">Jaką walutę chcesz zamienić?</span>
                    <select name="changeFrom" class="form__field js-currencyFrom" required>
                       <!-- Validator daje taką uwagę: The first child option element of a select element with a required attribute, and without a multiple attribute, and without a size attribute whose value is greater than 1, must have either an empty value attribute, or must have no text content -->
                        <option>PLN</option>
                        <option>EUR</option>
                        <option>GBP</option>
                        <option>USD</option>
                        <option>CHF</option>
                        <option>JPY</option>
                    </select>
                </label>
            </p>
            <p class="form__paragraph">
                <label><span class="form__labelText">Podaj wartość jaką chcesz zamienić:</span>
                    <input name="amount" type="number" step="0.01" min="0" class="form__field js-amountFrom" required>
                </label>
            </p>
            <p class="form__paragraph">
                <label><span class="form__labelText">Na jaką walutę?</span>
                    <select name="changeTo" class="form__field js-currencyTo" required>
                       <!-- Validator daje taką uwagę: The first child option element of a select element with a required attribute, and without a multiple attribute, and without a size attribute whose value is greater than 1, must have either an empty value attribute, or must have no text content -->
                        <option>PLN</option>
                        <option>EUR</option>
                        <option>GBP</option>
                        <option>USD</option>
                        <option>CHF</option>
                        <option>JPY</option>
                    </select>
                </label>
            </p>
            <p class="form__paragraph">
                <button class="form__button">Przelicz!</button>
            </p>

            <p class="form__paragraph form__paragraph--last js-resultPhrase">Podaj wartości i waluty aby móc obliczyć.
            </p>
            <!-- </fieldset> -->
        </form>
    </main>
    <p>Uwaga, wszystkie pola są wymagane.</p>
</body>

</html>
