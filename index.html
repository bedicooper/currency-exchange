<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przelicznik walut</title>
    <meta property="og:image" content="img/share.png">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script defer src="js/script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Merriweather:ital,wght@0,300;0,400;0,900;1,300;1,400;1,900&display=swap"
        rel="stylesheet">
</head>

<body class="body">
    <h1 class="body__header">Przelicznik walut</h1>
    <main class="main">
        <form class="form js-form">
            <div class="form__container">
                <div>
                    <label for="changeFrom"><span class="">Jaką walutę chcesz zamienić?</span>
                    </label>
                </div>
                <div>
                    <select name="changeFrom" class="form__field js-currencyFrom" required>
                        <option value="PLN">polski złoty</option>
                        <option value="EUR">euro</option>
                        <option value="GBP">funt brytyjski</option>
                        <option value="USD">dolar amerykański</option>
                        <option value="CHF">frank szwajcarski</option>
                        <option value="JPY">jen japoński</option>
                    </select>
                </div>
            </div>
            <div class="form__container">
                <div>
                    <label for="amount"><span class="">Wartość jaką chcesz zamienić:</span>
                    </label>
                </div>
                <div>
                    <input name="amount" type="number" step="0.01" min="0" class="form__field js-amountFrom" required>
                </div>
            </div>
            <div class="form__container">
                <div>
                    <label for="changeTo"><span class="">Na jaką walutę zamienić?</span>
                    </label>
                </div>
                <div>
                    <select name="changeTo" class="form__field js-currencyTo" required>
                        <option value="PLN">polski złoty</option>
                        <option value="EUR">euro</option>
                        <option value="GBP">funt brytyjski</option>
                        <option value="USD">dolar amerykański</option>
                        <option value="CHF">frank szwajcarski</option>
                        <option value="JPY">jen japoński</option>
                    </select>
                </div>
            </div>
            <div class="form__container">
                <button class="form__button">Przelicz!</button>
            </div>
            <p class="form__paragraph form__paragraph--last js-resultPhrase">Podaj wartości i waluty aby móc
                obliczyć.
            </p>
        </form>
    </main>
    <p>Uwaga, wszystkie pola są wymagane.</p>
</body>

</html>
